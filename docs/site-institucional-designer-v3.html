document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:20px;border:1px solid rgba(94,106,210,0.24);background:rgba(94,106,210,0.05);border-radius:13px;padding:18px 22px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;\">\n        <span style=\"font-size:13.5px;line-height:1.55;color:#c8cad0;flex:1 1 320px;text-wrap:pretty;\">A mesma adequação, com a norma que só nós dominamos na prática, atende também as serventias extrajudiciais.<\u002Fspan>\n        <a href=\"#cartorios\" style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#a9b0ec;flex:0 0 auto;\">\n          <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:11.5px;font-weight:600;color:#e08a8a;background:rgba(224,108,108,0.10);border:1px solid rgba(224,108,108,0.28);padding:3px 9px;border-radius:6px;\">Provimento 213<\u002Fspan>\n          Ver a vertical de cartórios →\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== CARTÓRIOS E O PROVIMENTO 213 ===================== -->\n  <section id=\"cartorios\" style=\"border-top:1px solid rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.05);background:linear-gradient(180deg,rgba(224,108,108,0.05),transparent 40%);\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(56px,7vw,96px) clamp(18px,5vw,40px);\">\n\n      <div style=\"display:flex;flex-direction:column;gap:14px;max-width:700px;margin-bottom:44px;\">\n        <div style=\"display:inline-flex;align-items:center;gap:9px;align-self:flex-start;padding:6px 13px;border:1px solid rgba(224,108,108,0.32);background:rgba(224,108,108,0.08);border-radius:99px;\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#e06c6c;animation:atrPulse 2.6s ease-in-out infinite;\"><\u002Fspan>\n          <span style=\"font-size:11.5px;font-weight:600;letter-spacing:0.06em;color:#e08a8a;text-transform:uppercase;\">Vertical de cartórios · prazo correndo<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"margin:0;font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-0.02em;line-height:1.1;color:#f2f2f4;text-wrap:balance;\">Adequação ao Provimento CNJ 213/2026.<\u002Fh2>\n        <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#9296a0;text-wrap:pretty;\">A norma revogou o Prov. 74/2018 e definiu padrões de TIC, segurança e LGPD para todas as serventias extrajudiciais. A adequação é dividida por classe de arrecadação e cumprida em cinco etapas sequenciais. As Etapas 1 e 2 já são obrigatórias.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- contador por classe -->\n      <div style=\"margin-bottom:16px;font-size:11.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#e08a8a;\">Quanto falta para as Etapas 1 e 2, por classe<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:16px;\">\n        <sc-for list=\"{{ prazos }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"position:relative;border:1px solid {{ p.border }};background:{{ p.bg }};border-radius:14px;padding:22px 22px 20px;display:flex;flex-direction:column;gap:8px;overflow:hidden;\">\n            <sc-if value=\"{{ p.urgent }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"position:absolute;top:16px;right:16px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#e06c6c;background:rgba(224,108,108,0.12);border:1px solid rgba(224,108,108,0.3);padding:2px 8px;border-radius:20px;\">mais urgente<\u002Fspan>\n            <\u002Fsc-if>\n            <span style=\"font-size:13px;font-weight:600;color:#c8cad0;\">Classe {{ p.classe }}<\u002Fspan>\n            <span style=\"font-size:12px;color:#787c88;line-height:1.4;\">{{ p.faixa }}<\u002Fspan>\n            <div style=\"display:flex;align-items:baseline;gap:8px;margin-top:6px;\">\n              <span style=\"font-size:clamp(44px,6vw,60px);font-weight:700;letter-spacing:-0.03em;line-height:0.95;color:{{ p.num }};\">{{ p.dias }}<\u002Fspan>\n              <span style=\"font-size:15px;font-weight:500;color:{{ p.numSoft }};\">dias<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-size:12.5px;color:#787c88;\">Etapas 1 e 2 até <span style=\"color:#a9abb5;font-weight:500;\">{{ p.data }}<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 48px;font-size:12px;color:#6b6f7a;line-height:1.5;text-wrap:pretty;\">Contagem sobre o prazo do art. 20, já somada à prorrogação de 90 dias da CGJ-RN. A classe é declarada pela própria serventia (art. 16, §1º), então qualquer classe exibida aqui é estimativa.<\u002Fp>\n\n      <!-- 3 classes -->\n      <div style=\"margin-bottom:16px;font-size:11.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#4f525b;\">As 3 classes, por arrecadação (semestral, corrigida por IPCA)<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:48px;\">\n        <sc-for list=\"{{ classes }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div style=\"border:1px solid rgba(255,255,255,0.08);background:#0d0e11;border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:10px;\" style-hover=\"border-color:rgba(255,255,255,0.14);\">\n            <div style=\"display:flex;align-items:center;gap:9px;\">\n              <span style=\"font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;font-weight:600;color:#a9b0ec;background:rgba(94,106,210,0.14);border:1px solid rgba(94,106,210,0.28);padding:2px 9px;border-radius:6px;\">{{ c.code }}<\u002Fspan>\n              <span style=\"font-size:14.5px;font-weight:600;color:#e4e5e8;\">{{ c.faixa }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0;font-size:13px;line-height:1.55;color:#9296a0;\">{{ c.desc }}<\u002Fp>\n            <div style=\"margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:5px;\">\n              <span style=\"font-size:12px;color:#787c88;\">Etapas 1 e 2 (art. 20): <span style=\"color:#dcdde1;font-weight:600;\">{{ c.inicial }}<\u002Fspan><\u002Fspan>\n              <span style=\"font-size:12px;color:#787c88;\">Adequação total (art. 23): <span style=\"color:#dcdde1;font-weight:600;\">{{ c.total }}<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- 5 etapas -->\n      <div style=\"margin-bottom:16px;font-size:11.5px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#4f525b;\">As 5 etapas sequenciais (Anexo IV)<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:44px;\">\n        <sc-for list=\"{{ etapas }}\" as=\"e\" hint-placeholder-count=\"5\">\n          <div style=\"border:1px solid rgba(255,255,255,0.07);background:#0a0b0d;border-radius:12px;padding:18px 18px 16px;display:flex;flex-direction:column;gap:9px;\">\n            <div style=\"display:flex;align-items:center;gap:9px;\">\n              <span style=\"width:26px;height:26px;flex:0 0 auto;border-radius:8px;background:rgba(94,106,210,0.14);border:1px solid rgba(94,106,210,0.28);display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;color:#a9b0ec;\">{{ e.n }}<\u002Fspan>\n              <sc-if value=\"{{ e.obrig }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"margin-left:auto;font-size:9.5px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#e08a8a;background:rgba(224,108,108,0.10);border:1px solid rgba(224,108,108,0.28);padding:2px 7px;border-radius:20px;\">obrigatória já<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <span style=\"font-size:14px;font-weight:600;color:#e4e5e8;line-height:1.3;\">{{ e.title }}<\u002Fspan>\n            <p style=\"margin:0;font-size:12.5px;line-height:1.5;color:#787c88;\">{{ e.scope }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- prorrogação callout -->\n      <div style=\"border:1px solid rgba(94,106,210,0.28);background:rgba(94,106,210,0.06);border-radius:14px;padding:22px 24px;display:flex;gap:16px;align-items:flex-start;margin-bottom:40px;\">\n        <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 16 16\" fill=\"none\" stroke=\"#a9b0ec\" stroke-width=\"1.5\" style=\"flex:0 0 auto;margin-top:2px;\"><circle cx=\"8\" cy=\"8\" r=\"6.4\"><\u002Fcircle><path d=\"M8 4.6v3.6l2.4 1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\">\n          <span style=\"font-size:14.5px;font-weight:600;color:#e4e5e8;\">A prorrogação da CGJ-RN é de 90 dias, e é única.<\u002Fspan>\n          <p style=\"margin:0;font-size:13.5px;line-height:1.6;color:#9296a0;text-wrap:pretty;\">Decisão de 02/07/2026 (PP 0000897-12.2026.2.00.0820). Vale de ofício para todas as serventias do RN, ninguém precisa requerer. O art. 21 permite prorrogar uma única vez, então não haverá outra. E o prazo adicional não dispensa nada: durante o período, as medidas mitigatórias continuam obrigatórias. A norma está em vigor desde 23/02/2026.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CTA diagnóstico com logos das associações -->\n      <div style=\"border:1px solid rgba(255,255,255,0.09);background:#0b0c10;border-radius:16px;padding:clamp(24px,4vw,36px);display:flex;gap:28px;flex-wrap:wrap;align-items:center;justify-content:space-between;\">\n        <div style=\"flex:1 1 380px;min-width:280px;display:flex;flex-direction:column;gap:12px;\">\n          <h3 style=\"margin:0;font-size:clamp(20px,2.6vw,26px);font-weight:700;letter-spacing:-0.02em;color:#f2f2f4;text-wrap:balance;\">Comece pelo diagnóstico gratuito.<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#9296a0;max-width:460px;text-wrap:pretty;\">Uma conversa de 20 minutos e um relatório por escrito com a sua classe, seus prazos e cada ponto de adequação. Sem compromisso.<\u002Fp>\n          <sc-if value=\"{{ showPartners }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:6px;\">\n              <span style=\"font-size:10.5px;font-weight:600;letter-spacing:0.08em;color:#5c5f6a;text-transform:uppercase;\">Realização e apoio<\u002Fspan>\n              <div style=\"display:flex;gap:9px;\">\n                <div style=\"height:34px;padding:0 12px;background:#f4f5f7;border-radius:7px;display:flex;align-items:center;\"><img src=\"b1465f32-f00a-46b6-833c-dbd4bb20edb5\" alt=\"Arpen/RN\" style=\"height:20px;display:block;\"><\u002Fdiv>\n                <div style=\"height:34px;padding:0 12px;background:#f4f5f7;border-radius:7px;display:flex;align-items:center;\"><img src=\"b821b691-bff2-4d64-be11-b3ec918e1c53\" alt=\"Anoreg/RN\" style=\"height:16px;display:block;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <a href=\"Diagnóstico 213 - Landing pública.dc.html\" style=\"display:inline-flex;align-items:center;height:52px;padding:0 26px;background:#5e6ad2;border-radius:9px;font-size:15.5px;font-weight:600;color:#fff;box-shadow:0 6px 20px rgba(94,106,210,0.35);flex:0 0 auto;\" style-hover=\"background:#6b76e0;\">Quero o diagnóstico gratuito<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== DIAGNÓSTICO (como funciona + preview) ===================== -->\n  <section id=\"diagnostico\" style=\"background:linear-gradient(180deg,#08090c,#060709);\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(56px,7vw,96px) clamp(18px,5vw,40px);display:flex;gap:clamp(32px,5vw,60px);flex-wrap:wrap;align-items:center;\">\n      <div style=\"flex:1 1 420px;min-width:300px;display:flex;flex-direction:column;gap:22px;\">\n        <span style=\"font-size:11.5px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:#8b93ec;\">Como funciona o diagnóstico<\u002Fspan>\n        <h2 style=\"margin:0;font-size:clamp(26px,3.6vw,40px);font-weight:700;letter-spacing:-0.02em;line-height:1.12;color:#f2f2f4;text-wrap:balance;\">Do cadastro ao relatório, em três passos.<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:2px;\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start;\">\n            <span style=\"width:30px;height:30px;flex:0 0 auto;border-radius:8px;background:rgba(94,106,210,0.14);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#a9b0ec;\">1<\u002Fspan>\n            <div><div style=\"font-size:14.5px;font-weight:600;color:#dcdde1;\">Você se cadastra<\u002Fdiv><div style=\"font-size:13px;color:#787c88;line-height:1.5;\">Leva 1 minuto, seis campos, sem compromisso.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start;\">\n            <span style=\"width:30px;height:30px;flex:0 0 auto;border-radius:8px;background:rgba(94,106,210,0.14);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#a9b0ec;\">2<\u002Fspan>\n            <div><div style=\"font-size:14.5px;font-weight:600;color:#dcdde1;\">Conversa de 20 minutos<\u002Fdiv><div style=\"font-size:13px;color:#787c88;line-height:1.5;\">Nossa equipe pergunta sobre o dia a dia, sem jargão técnico.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start;\">\n            <span style=\"width:30px;height:30px;flex:0 0 auto;border-radius:8px;background:rgba(94,106,210,0.14);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#a9b0ec;\">3<\u002Fspan>\n            <div><div style=\"font-size:14.5px;font-weight:600;color:#dcdde1;\">Relatório por escrito<\u002Fdiv><div style=\"font-size:13px;color:#787c88;line-height:1.5;\">Sua classe, seus prazos e o que falta em cada etapa.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"Diagnóstico 213 - Landing pública.dc.html\" style=\"display:inline-flex;align-items:center;align-self:flex-start;height:50px;padding:0 24px;background:#5e6ad2;border-radius:9px;font-size:15.5px;font-weight:600;color:#fff;box-shadow:0 6px 20px rgba(94,106,210,0.35);margin-top:4px;\" style-hover=\"background:#6b76e0;\">Começar meu diagnóstico<\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"flex:1 1 360px;min-width:300px;display:flex;justify-content:center;\">\n        <div style=\"width:100%;max-width:420px;background:#111214;border:1px solid rgba(255,255,255,0.09);border-radius:16px;box-shadow:0 30px 80px -24px rgba(0,0,0,0.75);overflow:hidden;\">\n          <div style=\"padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;\">\n            <span style=\"font-size:13px;font-weight:600;color:#e4e5e8;\">Relatório de adequação<\u002Fspan>\n            <span style=\"margin-left:auto;font-size:11px;font-weight:500;color:#787c88;\">exemplo ilustrativo<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:22px 20px;display:flex;gap:18px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06);\">\n            <div style=\"width:78px;height:78px;flex:0 0 auto;border-radius:50%;border:5px solid rgba(94,106,210,0.22);border-top-color:#5e6ad2;border-right-color:#5e6ad2;display:flex;align-items:center;justify-content:center;\">\n              <span style=\"font-size:24px;font-weight:700;color:#f2f2f4;filter:blur(6px);\">00%<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:5px;\">\n              <span style=\"font-size:12.5px;color:#787c88;\">Conformidade estimada<\u002Fspan>\n              <span style=\"font-size:13.5px;color:#c8cad0;filter:blur(4px);\">Etapas 1 a 5 avaliadas<\u002Fspan>\n              <span style=\"font-size:12px;color:#8b93ec;font-weight:600;\">Disponível após a conversa<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:18px 20px;display:flex;flex-direction:column;gap:12px;\">\n            <sc-for list=\"{{ reportBars }}\" as=\"b\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                <div style=\"display:flex;justify-content:space-between;\">\n                  <span style=\"font-size:12px;color:#9296a0;\">{{ b.name }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#c8cad0;font-weight:600;filter:blur(4px);\">00%<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"height:6px;background:#0a0b0d;border:1px solid rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;\"><div style=\"width:{{ b.w }};height:100%;background:{{ b.color }};filter:blur(2.5px);\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== QUEM SOMOS ===================== -->\n  <section id=\"quem-somos\" style=\"max-width:1180px;margin:0 auto;padding:clamp(56px,7vw,96px) clamp(18px,5vw,40px);\">\n    <div style=\"max-width:680px;display:flex;flex-direction:column;gap:14px;margin-bottom:40px;\">\n      <span style=\"font-size:11.5px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:#8b93ec;\">Quem somos<\u002Fspan>\n      <h2 style=\"margin:0;font-size:clamp(26px,3.6vw,40px);font-weight:700;letter-spacing:-0.02em;line-height:1.12;color:#f2f2f4;text-wrap:balance;\">Engenharia com prática de quem opera.<\u002Fh2>\n      <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#9296a0;text-wrap:pretty;\">A Átrios une desenvolvimento de software e prática de operação real. É o que faz a diferença nas três frentes: mais de 10 anos de atuação dentro de serventia extrajudicial, somados a engenharia de sistemas e segurança.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;\">\n      <sc-for list=\"{{ socios }}\" as=\"s\" hint-placeholder-count=\"2\">\n        <div style=\"border:1px solid rgba(255,255,255,0.08);background:#0d0e11;border-radius:14px;padding:22px;display:flex;gap:16px;align-items:center;\">\n          <div style=\"width:64px;height:64px;flex:0 0 auto;border-radius:50%;background:linear-gradient(150deg,#4c6ef5,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:600;color:#fff;\">{{ s.mono }}<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:4px;\">\n            <span style=\"font-size:16px;font-weight:600;color:#f2f2f4;\">{{ s.name }}<\u002Fspan>\n            <span style=\"font-size:13px;font-weight:500;color:#a9b0ec;\">{{ s.role }}<\u002Fspan>\n            <span style=\"font-size:12.5px;line-height:1.5;color:#787c88;\">{{ s.cred }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"margin:16px 0 0;font-size:12px;color:#6b6f7a;\">Fotos e nomes definitivos entram aqui quando confirmados. O layout já está pronto para recebê-los.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===================== TECNOLOGIAS ===================== -->\n  <section id=\"tecnologias\" style=\"border-top:1px solid rgba(255,255,255,0.05);background:linear-gradient(180deg,#08090c,#060709);\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(56px,7vw,96px) clamp(18px,5vw,40px);\">\n      <div style=\"max-width:680px;display:flex;flex-direction:column;gap:14px;margin-bottom:40px;\">\n        <span style=\"font-size:11.5px;font
