<!-- @dsCard group="Colors" viewport="700x130" subtitle="Per-repository accent dots" name="Repository Accents" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--atr-surface-0); font-family: var(--atr-font-sans); display: flex; gap: 12px; align-items: center; }
  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--atr-text-5); background: var(--atr-fill-1); border: 1px solid var(--atr-border); padding: 4px 10px; border-radius: var(--atr-radius-sm); }
  .chip span { width: 7px; height: 7px; border-radius: 50%; }
  .mono { font-family: var(--atr-font-mono); font-size: 10px; color: var(--atr-text-7); }
</style>
</head>
<body>
  <div class="chip"><span style="background:var(--atr-repo-web)"></span>web <span class="mono">#7AA2F7</span></div>
  <div class="chip"><span style="background:var(--atr-repo-api)"></span>api <span class="mono">#E0AF68</span></div>
  <div class="chip"><span style="background:var(--atr-repo-mobile)"></span>mobile <span class="mono">#BB9AF7</span></div>
</body>
</html>
