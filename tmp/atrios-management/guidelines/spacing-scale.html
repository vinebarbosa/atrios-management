<!-- @dsCard group="Spacing" viewport="700x150" subtitle="Dense 2px-based rhythm" name="Space Scale" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--atr-surface-0); font-family: var(--atr-font-sans); display: flex; gap: 16px; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--atr-primary); border-radius: 2px; width: 100%; }
  .box { display: flex; align-items: flex-end; width: 34px; height: 48px; }
  .lbl { font-family: var(--atr-font-mono); font-size: 10px; color: var(--atr-text-7); }
</style>
</head>
<body>
  <div class="sw"><div class="box"><div class="bar" style="height:8px"></div></div><span class="lbl">8</span></div>
  <div class="sw"><div class="box"><div class="bar" style="height:12px"></div></div><span class="lbl">12</span></div>
  <div class="sw"><div class="box"><div class="bar" style="height:16px"></div></div><span class="lbl">16</span></div>
  <div class="sw"><div class="box"><div class="bar" style="height:20px"></div></div><span class="lbl">20</span></div>
  <div class="sw"><div class="box"><div class="bar" style="height:28px"></div></div><span class="lbl">28</span></div>
  <div class="sw"><div class="box"><div class="bar" style="height:44px"></div></div><span class="lbl">44</span></div>
</body>
</html>
