<!-- @dsCard group="Effects" viewport="700x160" subtitle="Corner radii, xs → panel" name="Radii" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--atr-surface-0); font-family: var(--atr-font-sans); display: flex; gap: 16px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 60px; height: 52px; background: var(--atr-surface-card); border: 1px solid var(--atr-border-field); }
  .lbl { font-family: var(--atr-font-mono); font-size: 10px; color: var(--atr-text-7); }
</style>
</head>
<body>
  <div class="sw"><div class="box" style="border-radius:4px"></div><span class="lbl">xs · 4</span></div>
  <div class="sw"><div class="box" style="border-radius:6px"></div><span class="lbl">md · 6</span></div>
  <div class="sw"><div class="box" style="border-radius:8px"></div><span class="lbl">lg · 8</span></div>
  <div class="sw"><div class="box" style="border-radius:14px"></div><span class="lbl">2xl · 14</span></div>
  <div class="sw"><div class="box" style="border-radius:20px;width:80px"></div><span class="lbl">pill · 20</span></div>
</body>
</html>
