<!-- @dsCard group="Type" viewport="700x150" subtitle="Monospace — ids, codes, branches, repos" name="Monospace" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--atr-surface-0); font-family: var(--atr-font-sans); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .id { font-family: var(--atr-font-mono); font-size: 11px; color: var(--atr-text-7); }
  .code { font-family: var(--atr-font-mono); font-size: 11px; color: var(--atr-text-5); background: var(--atr-fill-2); padding: 1.5px 6px; border-radius: var(--atr-radius-xs); letter-spacing: 0.04em; }
  .branch { font-family: var(--atr-font-mono); font-size: 12px; color: var(--atr-text-3); }
  .repo { font-family: var(--atr-font-mono); font-size: 12.5px; color: var(--atr-text-2); }
  .repo b { color: var(--atr-text-8); font-weight: 400; }
</style>
</head>
<body>
  <span class="id">POR-27</span>
  <span class="code">POR</span>
  <span class="branch">por-19-retry-webhooks</span>
  <span class="repo"><b>atrios/</b>portico-api</span>
</body>
</html>
