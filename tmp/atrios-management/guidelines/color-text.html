<!-- @dsCard group="Colors" viewport="700x150" subtitle="Cool-gray text ramp, hi → faint" name="Text Ramp" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--atr-surface-0); font-family: var(--atr-font-sans); display: flex; flex-wrap: wrap; gap: 6px 22px; align-content: flex-start; }
  .r { display: flex; align-items: baseline; gap: 9px; }
  .t { font-size: 15px; font-weight: 500; }
  .m { font-family: var(--atr-font-mono); font-size: 10.5px; color: var(--atr-text-8); }
</style>
</head>
<body>
  <div class="r"><span class="t" style="color:var(--atr-text-hi)">text-hi</span><span class="m">#F2F2F4</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-2)">text-2</span><span class="m">#DCDDE1</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-3)">text-3</span><span class="m">#C8CAD0</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-4)">text-4</span><span class="m">#A9ABB5</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-5)">text-5</span><span class="m">#9296A0</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-6)">text-6</span><span class="m">#787C88</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-7)">text-7</span><span class="m">#6B6F7A</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-8)">text-8</span><span class="m">#5C5F6A</span></div>
  <div class="r"><span class="t" style="color:var(--atr-text-9)">text-9</span><span class="m">#4F525B</span></div>
</body>
</html>
